<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <ul class="language">
      <li>Js</li>
    </ul>
  </body>
  <script>
    // Add Element
    function addLanguage(language) {
      let lii = document.createElement("li");
      lii.appendChild(document.createTextNode(language));
      document.querySelector(".language").appendChild(lii);
    }
    addLanguage("golang");
    addLanguage("python");
    addLanguage("Cpp");

    // Edit Element
    const secLang = document.querySelector("li:nth-child(2)");
    const ele = document.createElement("li");
    ele.textContent = "Cp";
    secLang.replaceWith(ele);
    // Remove
   let lastlan= document.querySelector("li:last-child")
   lastlan.remove()

  </script>
</html>
